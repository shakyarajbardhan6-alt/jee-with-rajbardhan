<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JEE Doubt Solver — AI Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0f4ff;
      --muted: #8b9bbf;
      --accent: #3b82f6;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
    body {
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      background-image: radial-gradient(ellipse at 20% 10%, rgba(59,130,246,0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(16,185,129,0.08) 0%, transparent 50%);
    }
    header {
      width: 100%; max-width: 780px;
      padding: 32px 24px 0;
      display: flex; align-items: center; gap: 16px;
    }
    .logo-badge {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 15px; color: white; flex-shrink: 0;
    }
    .header-text h1 { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .header-text p { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .badge {
      margin-left: auto; padding: 5px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 500;
      background: rgba(59,130,246,0.15); color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.3); white-space: nowrap;
    }
    .chatbox {
      width: 100%; max-width: 780px;
      margin: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex; flex-direction: column;
      overflow: hidden; flex: 1;
    }
    .tabs {
      display: flex; gap: 6px; padding: 14px 18px 10px;
      border-bottom: 1px solid var(--border); overflow-x: auto;
    }
    .tab {
      padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      white-space: nowrap; font-family: 'DM Sans', sans-serif;
    }
    .tab.t-all  { background: rgba(99,102,241,0.15); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
    .tab.t-phy  { background: rgba(59,130,246,0.15); color: #60a5fa; border-color: rgba(59,130,246,0.3); }
    .tab.t-che  { background: rgba(16,185,129,0.15); color: #34d399; border-color: rgba(16,185,129,0.3); }
    .tab.t-mat  { background: rgba(245,158,11,0.15); color: #fcd34d; border-color: rgba(245,158,11,0.3); }
    .messages {
      flex: 1; overflow-y: auto; padding: 20px 18px;
      display: flex; flex-direction: column; gap: 16px;
      min-height: 320px; max-height: 420px;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    .msg { display: flex; gap: 12px; animation: slide-in 0.2s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes slide-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
    .av {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif;
    }
    .av.ai { background: linear-gradient(135deg, #1d4ed8, #0f766e); color: white; }
    .av.user { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .bubble {
      max-width: 82%; padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.7;
      background: var(--surface2); border: 1px solid var(--border);
    }
    .msg.user .bubble { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.3); color: #bfdbfe; border-radius: 12px 4px 12px 12px; }
    .msg.ai .bubble { border-radius: 4px 12px 12px 12px; }
    .bubble strong { color: #93c5fd; }
    .bubble em { color: #86efac; font-style: normal; font-weight: 500; }
    .bubble code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; color: #fcd34d; }
    .typing { display: flex; align-items: center; gap: 5px; padding: 12px 16px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: block; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,60%,100%{opacity:0.3} 30%{opacity:1} }
    .quick-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 18px 12px; }
    .quick-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 20px; cursor: pointer;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
    }
    .quick-btn:hover { background: rgba(59,130,246,0.1); color: #93c5fd; border-color: rgba(59,130,246,0.3); }
    .input-row {
      display: flex; gap: 10px; padding: 14px 18px 16px;
      border-top: 1px solid var(--border); align-items: flex-end;
    }
    textarea {
      flex: 1; resize: none; border-radius: 10px;
      border: 1px solid var(--border2);
      padding: 11px 15px; font-size: 14px; font-family: 'DM Sans', sans-serif;
      background: var(--surface2); color: var(--text);
      line-height: 1.55; max-height: 120px; min-height: 44px; outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: #4b5a7a; }
    .send {
      width: 44px; height: 44px; border-radius: 10px; border: none; cursor: pointer;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px;
    }
    .send:hover { background: #2563eb; }
    .send:active { transform: scale(0.94); }
    .send:disabled { background: var(--surface2); color: #4b5a7a; cursor: default; }
    footer {
      width: 100%; max-width: 780px;
      padding: 10px 24px 28px;
      text-align: center; font-size: 12px; color: #3d4f70;
    }
    footer span { color: #60a5fa; font-weight: 500; }
    @media (max-width: 600px) {
      header { padding: 20px 12px 0; }
      .chatbox { margin: 16px 12px; width: calc(100% - 24px); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">JEE</div>
  <div class="header-text">
    <h1>JEE Doubt Solver</h1>
    <p>AI tutor for Physics · Chemistry · Mathematics</p>
  </div>
  <span class="badge">Powered by Raj Bardhan</span>
</header>

<div class="chatbox">
  <div class="tabs">
    <button class="tab t-all" onclick="setSubject(this,'all','t-all')">All subjects</button>
    <button class="tab" onclick="setSubject(this,'phy','t-phy')">⚡ Physics</button>
    <button class="tab" onclick="setSubject(this,'che','t-che')">🧪 Chemistry</button>
    <button class="tab" onclick="setSubject(this,'mat','t-mat')">📐 Mathematics</button>
  </div>

  <div class="messages" id="msgs"></div>

  <div class="quick-row">
    <button class="quick-btn" onclick="sendQuick('What is escape velocity? Give formula and derivation.')">Escape velocity</button>
    <button class="quick-btn" onclick="sendQuick('Explain hybridization in benzene step by step.')">Benzene hybridization</button>
    <button class="quick-btn" onclick="sendQuick('How to solve integration by parts? Give an example.')">Integration by parts</button>
    <button class="quick-btn" onclick="sendQuick('Explain Bohr model of atom with energy formula.')">Bohr model</button>
    <button class="quick-btn" onclick="sendQuick('What is Le Chatelier principle with example?')">Le Chatelier</button>
    <button class="quick-btn" onclick="sendQuick('Explain projectile motion with all formulas.')">Projectile motion</button>
  </div>

  <div class="input-row">
    <textarea id="inp" rows="1" placeholder="Apna JEE doubt yahan likho... (Enter = send, Shift+Enter = new line)"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send" id="sendbtn" onclick="sendMsg()">&#10148;</button>
  </div>
</div>

<footer>
  JEE Doubt Solver &nbsp;·&nbsp; <span>Powered by Raj Bardhan</span> &nbsp;·&nbsp; Free for all JEE aspirants
</footer>

<script>
  let subject = 'all';
  let isLoading = false;
  let groqKey = localStorage.getItem('jee_groq_key') || '';
  if (!groqKey) {
  const k = prompt('Apni Groq API Key daalo:');
  if (k && k.startsWith('gsk_')) {
    groqKey = k;
    localStorage.setItem('jee_groq_key', k);
  }
}
  const history = [];

  const SYSTEM = `You are an expert JEE (Joint Entrance Examination) tutor for Indian students preparing for JEE Main and JEE Advanced.
Your role:
- Explain concepts clearly with step-by-step solutions
- Cover Physics, Chemistry, and Mathematics at JEE level
- Write formulas clearly in text (e.g. v² = u² + 2as)
- Point out common JEE mistakes students make
- Keep answers concise but complete — exam-focused

Always format your response like:
**Concept:** (brief explanation)
**Solution:** (step-by-step if numerical)
**Key Formula:** (important formula)
**JEE Tip:** (exam trick or common mistake to avoid)

Subject focus: {SUBJECT}`;

  function getSystem() {
    const m = { all: 'All subjects — Physics, Chemistry, Mathematics', phy: 'Physics only', che: 'Chemistry only', mat: 'Mathematics only' };
    return SYSTEM.replace('{SUBJECT}', m[subject]);
  }

  function setSubject(el, sub, cls) {
    document.querySelectorAll('.tab').forEach(t => t.className = 'tab');
    el.className = 'tab ' + cls;
    subject = sub;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
  }

  function sendQuick(t) { document.getElementById('inp').value = t; sendMsg(); }

  function addMsg(role, html) {
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'msg ' + role;
    d.innerHTML = `<div class="av ${role}">${role === 'ai' ? 'AI' : 'You'}</div><div class="bubble">${html}</div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'msg ai'; d.id = 'typ';
    d.innerHTML = `<div class="av ai">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function fmt(t) {
    return t
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
  }

  async function sendMsg() {
    if (isLoading) return;
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;

    inp.value = ''; inp.style.height = 'auto';
    document.getElementById('sendbtn').disabled = true;
    isLoading = true;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();

    try {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + groqKey
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: 1024,
          messages: [{ role: 'system', content: getSystem() }, ...history]
        })
      });

      const data = await res.json();
      document.getElementById('typ')?.remove();

      if (data.error) {
        addMsg('ai', `<span style="color:#f87171">Error: ${data.error.message}</span>`);
      } else {
        const reply = data.choices?.[0]?.message?.content || 'Koi jawab nahi mila, dobara try karo.';
        history.push({ role: 'assistant', content: reply });
        addMsg('ai', fmt(reply));
      }
    } catch (e) {
      document.getElementById('typ')?.remove();
      addMsg('ai', '<span style="color:#f87171">Connection error. Internet check karo aur dobara try karo.</span>');
    }

    isLoading = false;
    document.getElementById('sendbtn').disabled = false;
  }

  addMsg('ai', `<strong>Namaste! 👋 JEE Doubt Solver ready hai!</strong><br><br>Physics, Chemistry ya Maths ka koi bhi doubt poocho — main step-by-step samjhaunga! 🎯<br><br><span style="opacity:0.5;font-size:12px">Made with ❤️ by Raj Bardhan</span>`);
</script>
</body>
</html>
